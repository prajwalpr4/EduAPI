version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: eduapi_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eduapi}
      MYSQL_USER: ${MYSQL_USERNAME:-eduapi_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secretpassword}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eduapi_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${MYSQL_DATABASE:-eduapi}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USERNAME:-eduapi_user}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-secretpassword}
      - JWT_SECRET=${JWT_SECRET:-superSecretKeyThatIsAtLeast32CharactersLong!}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduapi_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    depends_on:
      - backend

volumes:
  db_data:
