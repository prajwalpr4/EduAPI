# ═══════════════════════════════════════
# EduAPI — Application Configuration
# ═══════════════════════════════════════

# Server
server.port=${SERVER_PORT:8080}

# ─── Database ───
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:eduapi}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ───
jwt.secret=${JWT_SECRET:defaultDevSecretKeyThatIsAtLeast32CharactersLong!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── OpenAPI / Swagger ───
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── CORS ───
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
